services:
  scheduler:
    volumes:
      - warehouse_ddb_data:/usr/local/airflow/warehouse_ddb

  dag-processor:
    volumes:
      - warehouse_ddb_data:/usr/local/airflow/warehouse_ddb

  api-server:
    volumes:
      - warehouse_ddb_data:/usr/local/airflow/warehouse_ddb

  triggerer:
    volumes:
      - warehouse_ddb_data:/usr/local/airflow/warehouse_ddb

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - AWS_DEFAULT_REGION=us-east-1
      - PERSISTENCE=1
    healthcheck:
      test: ["CMD", "bash", "-c", "awslocal s3 ls >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

  streamlit:
    image: ${COMPOSE_PROJECT_NAME:-crytpo-data-quality-dag_89a239}/airflow:latest
    command: streamlit run apps/streamlit/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/usr/local/airflow
      - warehouse_ddb_data:/usr/local/airflow/warehouse_ddb
    depends_on:
      - localstack

volumes:
  localstack-data:
  warehouse_ddb_data:

