version: 2

sources:
  - name: bronze
    description: Bronze layer ingested from CoinGecko history endpoint.
    schema: main
    tables:
      - name: bronze_coingecko_history
        description: Raw CoinGecko history payloads loaded from S3 JSON into DuckDB.
        columns:
          - name: coin_id
            description: CoinGecko coin id (e.g. ethereum).
            tests:
              - not_null
          - name: as_of_date
            description: Logical date for the history snapshot (YYYY-MM-DD).
            tests:
              - not_null
              - unique
          - name: payload
            description: Raw JSON payload from CoinGecko.
            tests:
              - not_null
          - name: ingested_at
            description: UTC timestamp when record was written to bronze.
            tests:
              - not_null