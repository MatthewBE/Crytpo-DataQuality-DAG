version: 2

models:
  - name: stg_coingecko_history
    description: Staging model built directly from bronze JSON files in S3 (Pattern B).
    columns:
      - name: coin_id
        description: Coin id parsed from bronze file path.
        tests:
          - not_null

      - name: as_of_date
        description: Snapshot date parsed from bronze file path.
        tests:
          - not_null

      - name: ingested_at
        description: Timestamp assigned during staging model execution.
        tests:
          - not_null

      - name: price_usd
        description: USD price extracted from payload.market_data.current_price.usd.
        tests:
          - not_null

      - name: market_cap_usd
        description: USD market cap extracted from payload.market_data.market_cap.usd.
        tests:
          - not_null

      - name: volume_usd
        description: USD volume extracted from payload.market_data.total_volume.usd.
        tests:
          - not_null

      - name: payload
        description: Raw JSON payload from bronze object.
        tests:
          - not_null